spring.application.name=PhenolicsDB

# SERVER
server.port=8080

# DATABASE
spring.datasource.url=jdbc:postgresql://localhost:5432/phenolicsdb
spring.datasource.username=phenollicsdb
spring.datasource.password=phenollicsdb

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ORCID
orcid.client-id=${ORCID_CLIENT_ID}
orcid.client-secret=${ORCID_CLIENT_SECRET}
orcid.redirect-uri=${ORCID_REDIRECT_URI}